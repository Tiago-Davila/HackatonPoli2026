<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Cámara Principal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1920px; height:1080px; overflow:hidden; background:transparent; }

  /* Header */
  .top-bar {
    position:absolute; top:0; left:0; right:0; height:80px;
    background:#0D1828; border-bottom:2px solid #C4A055;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 36px; z-index:20;
  }
  .ipm-tag { font-family:'Libre Baskerville',serif; font-size:11px; color:#B8A88A; letter-spacing:.26em; text-transform:uppercase; }

  /* Footer */
  .bottom-bar {
    position:absolute; bottom:0; left:0; right:0; height:48px;
    background:#0D1828; border-top:2px solid #C4A055;
    display:flex; align-items:center; justify-content:center; gap:28px; z-index:20;
  }
  .bt { font-family:'Libre Baskerville',serif; font-size:12px; letter-spacing:.22em; color:#B8A88A; text-transform:uppercase; }
  .bt strong { color:#C4A055; }
  .bsep { width:4px; height:4px; border-radius:50%; background:#C4A055; opacity:.5; }

  /* Backgrounds */
  .bg-main { position:absolute; top:80px; left:0; right:0; height:600px; background:#060e1c; }
  .bg-cond { position:absolute; top:684px; left:0; right:0; bottom:48px; background:#060e1c; }

  /* Main camera area */
  .main-area { position:absolute; top:80px; left:0; right:0; height:600px; overflow:hidden; }
  .main-cam-cell {
    position:relative; width:100%; height:100%;
    background:#0b1525;
    outline:1.5px solid rgba(196,160,85,.25); outline-offset:-1px;
  }
  .main-cam-cell::before {
    content:''; position:absolute; top:10px; left:10px; width:24px; height:24px; z-index:5;
    border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.6;
  }
  .main-cam-cell::after {
    content:''; position:absolute; bottom:10px; right:10px; width:24px; height:24px; z-index:5;
    border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.6;
  }

  /* Main EN VIVO badge */
  .main-live-badge {
    position:absolute; top:14px; right:14px; z-index:6;
    display:flex; align-items:center; gap:6px;
    background:rgba(10,18,35,.9); border:1px solid rgba(200,50,50,.65);
    padding:6px 14px 6px 10px; border-radius:2px;
  }
  .main-live-dot { width:9px; height:9px; border-radius:50%; background:#e03030; animation:blink 1.1s ease-in-out infinite; }
  .main-live-text { font-family:'Libre Baskerville',serif; font-size:13px; font-weight:700; color:#e03030; letter-spacing:.18em; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

  /* Location tag */
  .location-tag {
    position:absolute; bottom:18px; left:18px; z-index:6;
    display:flex; align-items:center; gap:12px;
    background:rgba(5,10,22,.92); border:1px solid rgba(196,160,85,.45);
    padding:10px 18px; border-radius:2px;
  }
  .loc-bar { width:3px; height:36px; background:#C4A055; flex-shrink:0; }
  .loc-label { font-family:'Libre Baskerville',serif; font-size:10px; color:#C4A055; letter-spacing:.25em; text-transform:uppercase; margin-bottom:4px; }
  .loc-name { font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:#E8DCC8; }

  /* Separator */
  .cam-sep {
    position:absolute; top:680px; left:0; right:0; height:4px;
    background:#0D1828; border-top:2px solid #C4A055;
  }

  /* Conductor row */
  .conductor-area {
    position:absolute; top:684px; left:0; right:0; bottom:48px;
    display:flex; gap:12px; padding:12px;
  }

  /* Conductor cam-cells */
  .cam-cell {
    position:relative; flex:1; min-width:0;
    background:#0b1525; overflow:hidden;
    outline:1.5px solid rgba(196,160,85,.3); outline-offset:-1px;
  }
  .cam-cell::before, .cam-cell::after {
    content:''; position:absolute; width:14px; height:14px; z-index:5; pointer-events:none;
  }
  .cam-cell::before { top:6px; left:6px; border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.7; }
  .cam-cell::after  { bottom:6px; right:6px; border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.7; }

  /* Conductor EN VIVO badge */
  .live-badge {
    position:absolute; top:8px; right:8px; z-index:6;
    display:flex; align-items:center; gap:4px;
    background:rgba(10,18,35,.85); border:1px solid rgba(200,50,50,.6);
    padding:3px 8px 3px 6px; border-radius:2px;
  }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#e03030; animation:blink 1.1s ease-in-out infinite; }
  .live-text { font-family:'Libre Baskerville',serif; font-size:10px; font-weight:700; color:#e03030; letter-spacing:.18em; }

  /* Conductor label */
  .cam-label {
    position:absolute; bottom:0; left:0; right:0; z-index:6;
    background:linear-gradient(to top, rgba(5,10,22,.97) 55%, transparent 100%);
    padding:20px 12px 10px; display:flex; align-items:flex-end; gap:10px;
  }
  .cam-label-bar { width:3px; flex-shrink:0; margin-bottom:2px; background:#C4A055; }
  .cam-role { font-family:'Libre Baskerville',serif; font-size:10px; color:#C4A055; letter-spacing:.2em; text-transform:uppercase; margin-bottom:3px; }
  .cam-name { font-family:'Playfair Display',serif; font-weight:700; color:#E8DCC8; line-height:1.1; text-shadow:0 2px 10px rgba(0,0,0,.95); }

  /* Corner deco */
  .cdeco { position:absolute; z-index:8; opacity:.3; pointer-events:none; }
  .cdeco.tl { top:86px; left:8px; }
  .cdeco.tr { top:86px; right:8px; transform:scaleX(-1); }
  .cdeco.bl { bottom:54px; left:8px; transform:scaleY(-1); }
  .cdeco.br { bottom:54px; right:8px; transform:scale(-1,-1); }
</style>
</head>
