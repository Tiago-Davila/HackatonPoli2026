<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Rosco Pasapalabra</title>
<!--
  OVERLAY ROSCO / PASAPALABRA
  Fuente de navegador OBS — 1920 × 1080 px, fondo transparente.

  Uso en OBS:
    - Agregar como Browser Source con ancho 1920 y alto 1080.
    - Usar "Interactuar" para operar los controles.

  Parámetros URL opcionales:
    ?team=Equipo%201       Nombre del equipo/participante
    ?data=rosco.json       Archivo JSON con preguntas
    ?controls=0            Oculta controles de producción
    ?compact=1             Mueve el rosco un poco a la derecha

  Formato JSON:
  [
    {"letter":"A","mode":"empieza","answer":"Algoritmo","question":"Conjunto de pasos..."},
    {"letter":"B","mode":"contiene","answer":"Web","question":"Contiene B: ..."}
  ]
-->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:1920px; height:1080px;
    overflow:hidden; background:transparent;
    font-family:'Libre Baskerville',serif;
  }

  :root {
    --bg:#060e1c;
    --bg2:#0a1525;
    --panel:rgba(6,14,28,.94);
    --panel2:rgba(10,21,37,.96);
    --gold:#C4A055;
    --cream:#E8DCC8;
    --muted:#B8A88A;
    --green:#2EBC6F;
    --red:#E14646;
    --yellow:#F2C94C;
  }

  .stage {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 42% 54% at 31% 49%, rgba(196,160,85,.08), transparent 68%),
      linear-gradient(90deg, rgba(6,14,28,.92), rgba(6,14,28,.52) 54%, transparent 78%);
  }
  .stage::before {
    content:''; position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0, transparent 59px, rgba(196,160,85,.032) 59px, rgba(196,160,85,.032) 60px),
      repeating-linear-gradient(0deg, transparent 0, transparent 59px, rgba(196,160,85,.022) 59px, rgba(196,160,85,.022) 60px);
    pointer-events:none;
  }

  .mosca {
    position:absolute; top:56px; left:70px; z-index:30;
    height:58px; width:auto; pointer-events:none;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.45));
  }

  .rosco-wrap {
    position:absolute; left:128px; top:155px;
    width:720px; height:720px;
    transition:left .2s ease;
  }
  body.compact .rosco-wrap { left:255px; }

  .ring-glow {
    position:absolute; inset:58px; border-radius:50%;
    border:1px solid rgba(196,160,85,.18);
    box-shadow:0 0 48px rgba(196,160,85,.16), inset 0 0 52px rgba(196,160,85,.08);
  }
  .ring-glow::before, .ring-glow::after {
    content:''; position:absolute; width:36px; height:36px;
    border-color:rgba(196,160,85,.72); border-style:solid;
  }
  .ring-glow::before { top:34px; left:34px; border-width:2px 0 0 2px; }
  .ring-glow::after { right:34px; bottom:34px; border-width:0 2px 2px 0; }

  .letter {
    position:absolute; left:50%; top:50%;
    width:72px; height:72px; margin:-36px 0 0 -36px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg, #0a1525, #060e1c);
    border:2px solid rgba(196,160,85,.62);
    color:var(--cream);
    font-family:'Playfair Display',serif; font-size:31px; font-weight:900;
    text-shadow:0 2px 8px rgba(0,0,0,.8);
    box-shadow:0 0 12px rgba(196,160,85,.26), inset 0 0 10px rgba(196,160,85,.08);
    transform:rotate(var(--a)) translate(304px) rotate(calc(-1 * var(--a)));
    transition:background .18s, border-color .18s, color .18s, box-shadow .18s, transform .18s;
  }
  .letter.active {
    border-color:var(--cream);
    box-shadow:0 0 24px rgba(232,220,200,.48), inset 0 0 16px rgba(232,220,200,.12);
    transform:rotate(var(--a)) translate(304px) rotate(calc(-1 * var(--a))) scale(1.12);
  }
  .letter.correct {
    background:linear-gradient(145deg, #208854, var(--green));
    border-color:#8FF0BC; color:#F5FFF9;
    box-shadow:0 0 22px rgba(46,188,111,.5), inset 0 0 10px rgba(255,255,255,.12);
  }
  .letter.wrong {
    background:linear-gradient(145deg, #8d2227, var(--red));
    border-color:#FF9C9C; color:#FFF6F6;
    box-shadow:0 0 22px rgba(225,70,70,.5), inset 0 0 10px rgba(255,255,255,.1);
  }
  .letter.passed {
    background:linear-gradient(145deg, #b8841e, var(--yellow));
    border-color:#FFE08A; color:#15100a;
    text-shadow:0 1px 3px rgba(255,255,255,.25);
    box-shadow:0 0 22px rgba(242,201,76,.55), inset 0 0 10px rgba(255,255,255,.12);
  }

  .center {
    position:absolute; left:50%; top:50%;
    width:370px; height:370px; margin:-185px 0 0 -185px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 45%, rgba(14,30,52,.98), rgba(6,14,28,.98) 72%);
    border:2px solid rgba(196,160,85,.42);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:42px;
  }
  .center-label {
    font-size:12px; color:rgba(196,160,85,.72);
    text-transform:uppercase; letter-spacing:.34em; padding-left:.34em;
  }
  .team {
    margin-top:12px;
    font-family:'Playfair Display',serif; font-size:45px; font-weight:900; line-height:1.02;
    color:var(--cream); text-transform:uppercase;
    text-shadow:0 0 18px rgba(196,160,85,.4);
  }
  .score {
    margin-top:20px; display:flex; gap:22px; align-items:center; justify-content:center;
  }
  .score-item { min-width:66px; }
  .score-value {
    font-family:'Playfair Display',serif; font-size:43px; font-weight:900; line-height:1;
  }
  .score-item.ok .score-value { color:var(--green); }
  .score-item.bad .score-value { color:var(--red); }
  .score-item.pass .score-value { color:var(--yellow); }
  .score-name {
    margin-top:3px; font-size:8px; color:rgba(184,168,138,.72);
    letter-spacing:.22em; text-transform:uppercase;
  }

  .question-card {
    position:absolute; top:185px; right:86px;
    width:850px; min-height:430px;
    background:var(--panel);
    border:1.5px solid rgba(196,160,85,.48);
    box-shadow:0 0 22px rgba(0,0,0,.35), inset 0 0 16px rgba(196,160,85,.06);
    padding:34px 40px 32px;
  }
  .question-card::before, .question-card::after {
    content:''; position:absolute; width:25px; height:25px; pointer-events:none;
    border-color:var(--gold); border-style:solid; opacity:.68;
  }
  .question-card::before { top:10px; left:10px; border-width:2px 0 0 2px; }
  .question-card::after { right:10px; bottom:10px; border-width:0 2px 2px 0; }
  .kicker {
    display:flex; align-items:center; gap:14px;
    color:rgba(196,160,85,.78); font-size:13px;
    text-transform:uppercase; letter-spacing:.3em;
  }
  .kicker::before, .kicker::after {
    content:''; height:1px; flex:1;
    background:linear-gradient(to right, transparent, rgba(196,160,85,.4));
  }
  .kicker::after { background:linear-gradient(to left, transparent, rgba(196,160,85,.4)); }
  .current-letter {
    margin-top:30px;
    font-family:'Playfair Display',serif; font-size:108px; line-height:.85; font-weight:900;
    color:var(--gold); text-shadow:0 0 24px rgba(196,160,85,.46);
  }
  .mode {
    margin-top:8px; color:var(--muted);
    font-size:16px; text-transform:uppercase; letter-spacing:.28em;
  }
  .question {
    margin-top:28px;
    color:var(--cream); font-size:30px; line-height:1.34;
    max-width:760px;
  }
  .answer {
    margin-top:24px;
    display:inline-flex; align-items:center; gap:10px;
    border-top:1px solid rgba(196,160,85,.28);
    padding-top:14px; color:rgba(184,168,138,.76);
    font-size:15px;
  }
  .answer strong { color:var(--cream); font-size:18px; }

  .controls {
    position:absolute; right:86px; bottom:70px;
    width:850px; min-height:258px;
    background:var(--panel2);
    border:1px solid rgba(196,160,85,.38);
    padding:18px 20px 20px;
  }
  body.no-controls .controls { display:none; }
  .control-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .select, .input, .textarea {
    background:#0a1525; border:1px solid rgba(196,160,85,.38);
    color:var(--cream); border-radius:3px; outline:none;
    font-family:'Libre Baskerville',serif; font-size:14px;
    padding:9px 10px;
  }
  .select { width:96px; }
  .input { flex:1; }
  .textarea {
    width:100%; height:72px; resize:none; line-height:1.35;
  }
  .btn {
    width:125px; min-width:0; height:40px; padding:0 8px;
    border-radius:3px; border:1px solid rgba(196,160,85,.45);
    background:rgba(196,160,85,.12); color:var(--gold);
    font-family:'Libre Baskerville',serif; font-size:12px; font-weight:700;
    letter-spacing:.06em; line-height:1.05; text-transform:uppercase;
    cursor:pointer;
  }
  .btn:hover { background:rgba(196,160,85,.24); }
  .btn.ok { border-color:rgba(46,188,111,.7); color:#8FF0BC; background:rgba(46,188,111,.14); }
  .btn.bad { border-color:rgba(225,70,70,.7); color:#FF9C9C; background:rgba(225,70,70,.13); }
  .btn.pass { border-color:rgba(242,201,76,.75); color:#FFE08A; background:rgba(242,201,76,.14); }
  .btn.ghost { color:rgba(232,220,200,.76); }
  .letter-jump {
    display:grid; grid-template-columns:repeat(14, 1fr); gap:6px;
  }
  .jump {
    height:30px; border-radius:3px; border:1px solid rgba(196,160,85,.32);
    background:rgba(6,14,28,.9); color:var(--cream);
    font-family:'Playfair Display',serif; font-weight:900; font-size:16px;
    cursor:pointer;
  }
  .jump.active { outline:2px solid var(--cream); outline-offset:1px; }
  .jump.correct { background:rgba(46,188,111,.55); }
  .jump.wrong { background:rgba(225,70,70,.58); }
  .jump.passed { background:rgba(242,201,76,.68); color:#15100a; }
  .hint {
    margin-top:10px;
    font-size:10px; color:rgba(184,168,138,.58);
    letter-spacing:.12em; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="stage"></div>
<img class="mosca" src="LogoCompleto.png" alt="Politón 2026">

<main>
  <section class="rosco-wrap" aria-label="Rosco">
    <div class="ring-glow"></div>
    <div id="letters"></div>
    <div class="center">
      <div class="center-label">Pasapalabra</div>
      <div class="team" id="team">Equipo</div>
      <div class="score">
        <div class="score-item ok"><div class="score-value" id="ok-count">0</div><div class="score-name">Bien</div></div>
        <div class="score-item pass"><div class="score-value" id="pass-count">0</div><div class="score-name">Pasa</div></div>
        <div class="score-item bad"><div class="score-value" id="bad-count">0</div><div class="score-name">Mal</div></div>
      </div>
    </div>
  </section>

  <section class="question-card">
    <div class="kicker">Pregunta activa</div>
    <div class="current-letter" id="current-letter">A</div>
    <div class="mode" id="mode">Empieza con A</div>
    <div class="question" id="question">Cargar pregunta desde los controles o con un archivo JSON.</div>
    <div class="answer">Respuesta: <strong id="answer">-</strong></div>
  </section>

  <section class="controls" aria-label="Controles de producción">
    <div class="control-row">
      <select class="select" id="letter-select" title="Letra"></select>
      <input class="input" id="mode-input" type="text" spellcheck="false" placeholder="Empieza con A / Contiene A">
      <input class="input" id="answer-input" type="text" spellcheck="false" placeholder="Respuesta esperada">
    </div>
    <div class="control-row">
      <textarea class="textarea" id="question-input" spellcheck="false" placeholder="Pregunta"></textarea>
    </div>
    <div class="control-row">
      <button class="btn ok" id="btn-correct">Correcta</button>
      <button class="btn pass" id="btn-pass">Pasar palabra</button>
      <button class="btn bad" id="btn-wrong">Incorrecta</button>
      <button class="btn ghost" id="btn-next">Siguiente</button>
      <button class="btn ghost" id="btn-save">Guardar texto</button>
      <button class="btn ghost" id="btn-reset">Reset</button>
    </div>
    <div class="letter-jump" id="letter-jump"></div>
    <div class="hint">Atajos: 1 correcta · 2 pasar · 3 incorrecta · espacio siguiente · flechas cambian letra · S guarda texto</div>
  </section>
</main>

<script>
const p = new URLSearchParams(location.search);
const ALPHABET = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','Ñ','O','P','Q','R','S','T','U','V','W','X','Y','Z'];
const STORAGE_KEY = 'politon-rosco-state-v1';

const defaultQuestions = ALPHABET.map(letter => ({
  letter,
  mode: `Empieza con ${letter}`,
  answer: '',
  question: `Pregunta para la letra ${letter}.`
}));

let questions = defaultQuestions.map(q => ({ ...q }));
let state = {
  current: 0,
  statuses: Object.fromEntries(ALPHABET.map(l => [l, 'pending']))
};

const els = {
  body: document.body,
  letters: document.getElementById('letters'),
  jumps: document.getElementById('letter-jump'),
  team: document.getElementById('team'),
  ok: document.getElementById('ok-count'),
  pass: document.getElementById('pass-count'),
  bad: document.getElementById('bad-count'),
  currentLetter: document.getElementById('current-letter'),
  mode: document.getElementById('mode'),
  question: document.getElementById('question'),
  answer: document.getElementById('answer'),
  select: document.getElementById('letter-select'),
  modeInput: document.getElementById('mode-input'),
  answerInput: document.getElementById('answer-input'),
  questionInput: document.getElementById('question-input')
};

if (p.get('controls') === '0') els.body.classList.add('no-controls');
if (p.get('compact') === '1') els.body.classList.add('compact');
els.team.textContent = p.get('team') || 'Equipo';

function normalizeEntry(entry, fallbackLetter) {
  const letter = String(entry.letter || fallbackLetter).toUpperCase();
  return {
    letter,
    mode: entry.mode || `Empieza con ${letter}`,
    answer: entry.answer || '',
    question: entry.question || `Pregunta para la letra ${letter}.`
  };
}

async function loadData() {
  const dataUrl = p.get('data');
  if (dataUrl) {
    try {
      const res = await fetch(dataUrl, { cache: 'no-store' });
      const data = await res.json();
      questions = ALPHABET.map(letter => {
        const found = data.find(item => String(item.letter || '').toUpperCase() === letter);
        return normalizeEntry(found || {}, letter);
      });
    } catch (err) {
      console.warn('No se pudo cargar el JSON del rosco:', err);
    }
  }

  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && saved.statuses) {
      state = {
        current: Math.min(ALPHABET.length - 1, Math.max(0, saved.current || 0)),
        statuses: { ...state.statuses, ...saved.statuses }
      };
      if (Array.isArray(saved.questions)) {
        questions = ALPHABET.map(letter => {
          const found = saved.questions.find(item => item.letter === letter);
          return normalizeEntry(found || {}, letter);
        });
      }
    }
  } catch (err) {
    console.warn('No se pudo leer el estado del rosco:', err);
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...state, questions }));
}

function buildRosco() {
  const step = 360 / ALPHABET.length;
  els.letters.innerHTML = '';
  els.jumps.innerHTML = '';
  els.select.innerHTML = '';

  ALPHABET.forEach((letter, i) => {
    const chip = document.createElement('div');
    chip.className = 'letter';
    chip.dataset.letter = letter;
    chip.style.setProperty('--a', `${-90 + i * step}deg`);
    chip.textContent = letter;
    els.letters.appendChild(chip);

    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = letter;
    els.select.appendChild(opt);

    const jump = document.createElement('button');
    jump.className = 'jump';
    jump.type = 'button';
    jump.dataset.index = String(i);
    jump.textContent = letter;
    jump.addEventListener('click', () => setCurrent(i));
    els.jumps.appendChild(jump);
  });
}

function currentQuestion() {
  return questions[state.current] || questions[0];
}

function setCurrent(index) {
  state.current = (index + ALPHABET.length) % ALPHABET.length;
  saveState();
  render();
}

function nextPlayable(from = state.current + 1) {
  for (let offset = 0; offset < ALPHABET.length; offset++) {
    const index = (from + offset) % ALPHABET.length;
    const letter = ALPHABET[index];
    if (state.statuses[letter] !== 'correct' && state.statuses[letter] !== 'wrong') return index;
  }
  return state.current;
}

function mark(status) {
  const letter = ALPHABET[state.current];
  state.statuses[letter] = status;
  state.current = nextPlayable(state.current + 1);
  saveState();
  render();
}

function saveCurrentText() {
  const q = currentQuestion();
  q.mode = els.modeInput.value.trim() || `Empieza con ${q.letter}`;
  q.answer = els.answerInput.value.trim();
  q.question = els.questionInput.value.trim() || `Pregunta para la letra ${q.letter}.`;
  saveState();
  render();
}

function resetRosco() {
  state = {
    current: 0,
    statuses: Object.fromEntries(ALPHABET.map(l => [l, 'pending']))
  };
  saveState();
  render();
}

function render() {
  const q = currentQuestion();
  const counts = { correct: 0, wrong: 0, passed: 0 };
  ALPHABET.forEach(letter => {
    const status = state.statuses[letter] || 'pending';
    if (counts[status] !== undefined) counts[status]++;
  });

  els.ok.textContent = counts.correct;
  els.pass.textContent = counts.passed;
  els.bad.textContent = counts.wrong;
  els.currentLetter.textContent = q.letter;
  els.mode.textContent = q.mode;
  els.question.textContent = q.question;
  els.answer.textContent = q.answer || '-';
  els.select.value = String(state.current);
  els.modeInput.value = q.mode;
  els.answerInput.value = q.answer;
  els.questionInput.value = q.question;

  document.querySelectorAll('.letter').forEach(node => {
    const status = state.statuses[node.dataset.letter] || 'pending';
    node.className = `letter ${status === 'pending' ? '' : status}`;
    if (node.dataset.letter === q.letter) node.classList.add('active');
  });
  document.querySelectorAll('.jump').forEach(node => {
    const index = Number(node.dataset.index);
    const letter = ALPHABET[index];
    const status = state.statuses[letter] || 'pending';
    node.className = `jump ${status === 'pending' ? '' : status}`;
    if (index === state.current) node.classList.add('active');
  });
}

document.getElementById('btn-correct').addEventListener('click', () => mark('correct'));
document.getElementById('btn-pass').addEventListener('click', () => mark('passed'));
document.getElementById('btn-wrong').addEventListener('click', () => mark('wrong'));
document.getElementById('btn-next').addEventListener('click', () => setCurrent(nextPlayable()));
document.getElementById('btn-save').addEventListener('click', saveCurrentText);
document.getElementById('btn-reset').addEventListener('click', resetRosco);
els.select.addEventListener('change', () => setCurrent(Number(els.select.value)));

document.addEventListener('keydown', event => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') {
    if (event.code === 'KeyS' && (event.ctrlKey || event.metaKey)) {
      event.preventDefault();
      saveCurrentText();
    }
    return;
  }
  if (event.code === 'Digit1') mark('correct');
  if (event.code === 'Digit2') mark('passed');
  if (event.code === 'Digit3') mark('wrong');
  if (event.code === 'Space') { event.preventDefault(); setCurrent(nextPlayable()); }
  if (event.code === 'ArrowRight') setCurrent(state.current + 1);
  if (event.code === 'ArrowLeft') setCurrent(state.current - 1);
  if (event.code === 'KeyS') saveCurrentText();
});

loadData().then(() => {
  buildRosco();
  render();
});
</script>
</body>
</html>
