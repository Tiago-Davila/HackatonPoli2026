<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Multicam 2p</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1920px; height:1080px; overflow:hidden; background:#060e1c; }

/* Fondo área cámaras */
.bg { position:absolute; top:0; left:0; right:0; bottom:0; background:#060e1c;
  background-image:repeating-linear-gradient(90deg,transparent 0px,transparent 59px,rgba(196,160,85,.035) 59px,rgba(196,160,85,.035) 60px),linear-gradient(160deg,#060e1c 0%,#0c1a2e 50%,#060e1c 100%); }
  .bg::before { content:""; position:absolute; top:-30%; left:-20%; width:140%; height:140%; background:radial-gradient(ellipse 55% 40% at 50% 50%,rgba(196,160,85,.09) 0%,transparent 65%); animation:bgGlow 7s ease-in-out infinite; pointer-events:none; }

/* Celda de cámara */
.cam-cell {
  position:relative; background:#0b1525; overflow:hidden; flex-shrink:0;
  outline:1.5px solid rgba(196,160,85,0.3); outline-offset:-1px;
}
.cam-cell::before, .cam-cell::after {
  content:''; position:absolute; width:18px; height:18px; z-index:5; pointer-events:none;
}
.cam-cell::before { top:8px; left:8px; border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.7; }
.cam-cell::after  { bottom:8px; right:8px; border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.7; }

/* Badge EN VIVO */

/* Etiqueta nombre */

/* Decoraciones esquina del área */

  .cam-area { position:absolute; top:10px; left:10px; right:10px; bottom:10px;
    display:flex; gap:20px; }
  .cam-area > .cam-cell { flex:1; }
    /* Background glow animation */
  @keyframes bgGlow { 0%,100%{opacity:.45;transform:translate(-6%,-4%) scale(1.12)} 50%{opacity:1;transform:translate(6%,4%) scale(.9)} }</style>
</head><body>
<div class="bg"></div>

<div class="cam-area">
  <div class="cam-cell">  </div>
  <div class="cam-cell">  </div></div>


<script>
const p=new URLSearchParams(location.search);
  if(p.get('n1'))document.getElementById('name1').textContent=p.get('n1');
  if(p.get('r1'))document.getElementById('role1').textContent=p.get('r1');
  if(p.get('n2'))document.getElementById('name2').textContent=p.get('n2');
  if(p.get('r2'))document.getElementById('role2').textContent=p.get('r2');
</script></body></html>
