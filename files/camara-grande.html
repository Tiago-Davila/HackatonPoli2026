<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Cámara Principal</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1920px; height:1080px; overflow:hidden; background:#060e1c; }

  /* Backgrounds */
  .bg-main { position:absolute; top:10px; left:0; right:0; height:720px; background:#060e1c; }

  /* Main camera area */
  .main-area { position:absolute; top:10px; left:0; right:0; height:720px; overflow:hidden; }
  .main-cam-cell {
    position:relative; width:100%; height:100%;
    background:#0b1525;
    outline:1.5px solid rgba(196,160,85,.25); outline-offset:-1px;
  }
  .main-cam-cell::before {
    content:''; position:absolute; top:10px; left:10px; width:24px; height:24px; z-index:5;
    border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.6;
  }
  .main-cam-cell::after {
    content:''; position:absolute; bottom:10px; right:10px; width:24px; height:24px; z-index:5;
    border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.6;
  }

  /* Conductor EN VIVO badge */

  /* Conductor label */

  /* Corner deco */
  /* Background glow animation */
  @keyframes bgGlow { 0%,100%{opacity:.45;transform:translate(-6%,-4%) scale(1.12)} 50%{opacity:1;transform:translate(6%,4%) scale(.9)} }</style>
</head>
<body>

<div class="bg-main"></div>

<div class="main-area">
  <div class="main-cam-cell">  </div>
</div></body>
</html>
