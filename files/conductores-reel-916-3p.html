<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Conductores + Contenido 9:16 (3p)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1920px; height:1080px; overflow:hidden; background:#060e1c; }

  

  .bg { position:absolute; top:0; left:0; right:0; bottom:0; background:#060e1c;
  background-image:repeating-linear-gradient(90deg,transparent 0px,transparent 59px,rgba(196,160,85,.035) 59px,rgba(196,160,85,.035) 60px),linear-gradient(160deg,#060e1c 0%,#0c1a2e 50%,#060e1c 100%); }
  .bg::before { content:""; position:absolute; top:-30%; left:-20%; width:140%; height:140%; background:radial-gradient(ellipse 55% 40% at 50% 50%,rgba(196,160,85,.09) 0%,transparent 65%); animation:bgGlow 7s ease-in-out infinite; pointer-events:none; }

  .content-area {
    position:absolute; top:10px; left:10px; right:10px; bottom:10px;
    display:flex; align-items:stretch;
  }

  .conductor { flex:1; min-width:0; position:relative;
    background:#0b1525; overflow:hidden;
    outline:1.5px solid rgba(196,160,85,.3); outline-offset:-1px;
  }
  .conductor::before, .conductor::after {
    content:''; position:absolute; width:18px; height:18px; z-index:5; pointer-events:none;
  }
  .conductor::before { top:8px; left:8px; border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.7; }
  .conductor::after  { bottom:8px; right:8px; border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.7; }

  .cond-col { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; }
  .cond-col .conductor { flex:1; flex-basis:0; outline-offset:-1px; }
  .cond-col .conductor + .conductor { border-top:1px solid rgba(196,160,85,.25); }

  .center-zone {
    flex:0 0 536px; position:relative;
    background:#040810; overflow:hidden;
    border-left:2px solid #C4A055;
    border-right:2px solid #C4A055;
  }
  .content-frame {
    position:absolute; top:0; left:0; right:0; bottom:0;
    border:1px solid rgba(196,160,85,.35);
    background:#020609;
  }
  .content-frame::before { content:''; position:absolute; top:-1px; left:-1px; width:20px; height:20px; border-top:2px solid #C4A055; border-left:2px solid #C4A055; }
  .content-frame::after  { content:''; position:absolute; bottom:-1px; right:-1px; width:20px; height:20px; border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; }
  .frame-corner-tr { position:absolute; top:-1px; right:-1px; width:20px; height:20px; border-top:2px solid #C4A055; border-right:2px solid #C4A055; }
  .frame-corner-bl { position:absolute; bottom:-1px; left:-1px; width:20px; height:20px; border-bottom:2px solid #C4A055; border-left:2px solid #C4A055; }

  /* Background glow animation */
  @keyframes bgGlow { 0%,100%{opacity:.45;transform:translate(-6%,-4%) scale(1.12)} 50%{opacity:1;transform:translate(6%,4%) scale(.9)} }</style>
</head>
<body>
<div class="bg"></div>
<div class="content-area">
  <div class="cond-col">
    <div class="conductor" id="cond-left1">    </div>
    <div class="conductor" id="cond-left2">    </div>
  </div>
  <!-- Zona central 16:9 -->
  <div class="center-zone">
    <div class="content-frame">
      <div class="frame-corner-tr"></div>
      <div class="frame-corner-bl"></div>
    </div>
  </div>
  <div class="conductor" id="cond-right">  </div>
</div>
<script>
const p = new URLSearchParams(location.search);
['n1','n2','n3'].forEach((k,i)=>{ const v=p.get(k); if(v) document.getElementById('name'+(i+1)).textContent=v; });
['r1','r2','r3'].forEach((k,i)=>{ const v=p.get(k); if(v) document.getElementById('role'+(i+1)).textContent=v; });
</script></body>
</html>
