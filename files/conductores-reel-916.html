<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
<title>Politón — Conductores + Contenido 9:16</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1920px; height:1080px; overflow:hidden; background:#060e1c; }

  /* Background */
  .bg { position:absolute; top:0; left:0; right:0; bottom:0; background:#060e1c;
  background-image:repeating-linear-gradient(90deg,transparent 0px,transparent 59px,rgba(196,160,85,.035) 59px,rgba(196,160,85,.035) 60px),linear-gradient(160deg,#060e1c 0%,#0c1a2e 50%,#060e1c 100%); }
  .bg::before { content:""; position:absolute; top:-30%; left:-20%; width:140%; height:140%; background:radial-gradient(ellipse 55% 40% at 50% 50%,rgba(196,160,85,.09) 0%,transparent 65%); animation:bgGlow 7s ease-in-out infinite; pointer-events:none; }

  /* Content area */
  .content-area {
    position:absolute; top:10px; left:10px; right:10px; bottom:10px;
    display:flex;
  }

  /* Conductor cells — 692px wide each, full content height */
  .conductor { flex:1; min-width:0; position:relative;
    background:#0b1525; overflow:hidden;
    outline:1.5px solid rgba(196,160,85,.3); outline-offset:-1px;
  }
  .conductor::before, .conductor::after {
    content:''; position:absolute; width:18px; height:18px; z-index:5; pointer-events:none;
  }
  .conductor::before { top:8px; left:8px; border-top:2px solid #C4A055; border-left:2px solid #C4A055; opacity:.7; }
  .conductor::after  { bottom:8px; right:8px; border-bottom:2px solid #C4A055; border-right:2px solid #C4A055; opacity:.7; }

  /* Center 9:16 zone — 536px wide (9/16 × 952px ≈ 536px) */
  .center-zone {
    flex:0 0 536px; position:relative;
    background:#040810; overflow:hidden;
    border-left:2px solid #C4A055;
    border-right:2px solid #C4A055;
  }
  /* Zone header label */
  /* Zone corner brackets */
  .zone-corner { position:absolute; z-index:5; opacity:.4; pointer-events:none; }
  .zone-corner.tl { top:46px; left:10px; }
  .zone-corner.tr { top:46px; right:10px; transform:scaleX(-1); }
  .zone-corner.bl { bottom:10px; left:10px; transform:scaleY(-1); }
  .zone-corner.br { bottom:10px; right:10px; transform:scale(-1,-1); }
  /* Zone ratio label */

  /* EN VIVO badge */

  /* Conductor label */

  /* Corner deco (area level) */
  /* Background glow animation */
  @keyframes bgGlow { 0%,100%{opacity:.45;transform:translate(-6%,-4%) scale(1.12)} 50%{opacity:1;transform:translate(6%,4%) scale(.9)} }</style>
</head>
<body>

<div class="bg"></div>

<div class="content-area">

  <!-- Conductor izquierdo -->
  <div class="conductor" id="cond-left">  </div>

  <!-- Zona central 9:16 -->
  <div class="center-zone">
    <div class="zone-corner tl"><svg width="22" height="22" fill="none"><path d="M2 2L2 18M2 2L18 2" stroke="#C4A055" stroke-width="1.5"/></svg></div>
    <div class="zone-corner tr"><svg width="22" height="22" fill="none"><path d="M2 2L2 18M2 2L18 2" stroke="#C4A055" stroke-width="1.5"/></svg></div>
    <div class="zone-corner bl"><svg width="22" height="22" fill="none"><path d="M2 2L2 18M2 2L18 2" stroke="#C4A055" stroke-width="1.5"/></svg></div>
    <div class="zone-corner br"><svg width="22" height="22" fill="none"><path d="M2 2L2 18M2 2L18 2" stroke="#C4A055" stroke-width="1.5"/></svg></div>
  </div>

  <!-- Conductor derecho -->
  <div class="conductor" id="cond-right">  </div>

</div>


<script>
const p = new URLSearchParams(location.search);
['n1','n2'].forEach((k,i) => { const v=p.get(k); if(v) document.getElementById('name'+(i+1)).textContent=v; });
['r1','r2'].forEach((k,i) => { const v=p.get(k); if(v) document.getElementById('role'+(i+1)).textContent=v; });
</script></body>
</html>
