<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Moscas Overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:1920px; height:1080px;
    overflow:hidden;
    background:transparent;
  }
  .mosca { position:absolute; z-index:50; pointer-events:none; }
  .mosca-l { top:70px; left:70px; }
  .mosca-r { top:70px; right:70px; }
  .mosca img { height:60px; width:auto; }
</style>
</head>
<body>
<div class="mosca mosca-l"><img src="LogoCompleto.png" alt="Politon 2026"></div>
<div class="mosca mosca-r"><img src="logo_IPM_cartoon.png" alt="IPM"></div>
</body>
</html>
