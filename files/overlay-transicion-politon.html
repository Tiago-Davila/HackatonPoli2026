<body>
<div id="curtain"></div>
<div id="mascota"></div>
<img id="logo" src="LogoCompleto.png" alt="" />
<script>
const el      = document.getElementById('mascota');
const curtain = document.getElementById('curtain');
const logo    = document.getElementById('logo');

const FW = 173, FH = 168, FRAMES = 6;
const W = 1920, H = 1080;

// URL params: ?loop  ?delay=ms
const params    = new URLSearchParams(location.search);
const LOOP      = params.has('loop');
const INIT_WAIT = parseInt(params.get('delay') || '400', 10);

// Timings (ms) — +1 s distributed across close and open
const CLOSE_DUR = 1700;
const PAUSE_DUR = 650;
const OPEN_DUR  = 1450;
const LOOP_WAIT = 1800;

// Sprite frame cycling
let frame = 0;
setInterval(() => {
  frame = (frame + 1) % FRAMES;
  el.style.backgroundPosition = '-' + (frame * FW) + 'px 0px';
}, 100);

// Easing
function ease(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

// Cubic bezier helper (for Y-axis curve)
function cbez(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
}

// ── Phase 1: CLOSE (Politon L→R, curtain grows from left) ──────────
function closePhase(onDone) {
  el.style.display   = 'block';
  logo.style.display = 'block';
  logo.style.left    = '-9999px';           // off-screen while measuring
  const logoW        = logo.offsetWidth;    // force reflow → get real width
  curtain.style.left      = '0';
  curtain.style.right     = 'auto';
  curtain.style.width     = '0';
  curtain.style.boxShadow = '6px 0 28px rgba(196,160,85,0.45)';

  // Curved Y path: centered vertically (top ≈ H/2 - FH/2), with subtle arc
  const yP = [H*0.42, H*0.33, H*0.44, H*0.42];

  let t0 = null;
  requestAnimationFrame(function step(ts) {
    if (!t0) t0 = ts;
    const raw = Math.min((ts - t0) / CLOSE_DUR, 1);
    const t   = ease(raw);

    // X: -FW → W+FW
    const x = -FW + (W + 2 * FW) * t;
    // Y: bezier curve
    const y = cbez(yP[0], yP[1], yP[2], yP[3], t);
    // Subtle rotation following movement direction
    const t2   = ease(Math.min(raw + 0.015, 1));
    const x2   = -FW + (W + 2 * FW) * t2;
    const y2   = cbez(yP[0], yP[1], yP[2], yP[3], t2);
    const deg  = Math.atan2(y2 - y, x2 - x) * 180 / Math.PI;

    el.style.left      = x.toFixed(1) + 'px';
    el.style.top       = y.toFixed(1) + 'px';
    el.style.transform = 'rotate(' + deg.toFixed(1) + 'deg)';

    // Curtain right-edge aligns with Politon's center (half in / half out)
    const curtainWidth = Math.min(W, Math.max(0, x + FW/2));
    curtain.style.width = curtainWidth.toFixed(0) + 'px';
    // Logo tracks curtain center — formula places it off-screen left when curtain is small,
    // slides it in from the left as curtain grows (no threshold = no pop)
    logo.style.left = (curtainWidth / 2 - logoW / 2).toFixed(0) + 'px';

    if (raw < 1) {
      requestAnimationFrame(step);
    } else {
      curtain.style.width     = W + 'px';
      logo.style.left         = (W / 2 - logoW / 2).toFixed(0) + 'px';
      curtain.style.boxShadow = 'none';
      el.style.display = 'none';
      setTimeout(onDone, PAUSE_DUR);
    }
  });
}

// ── Phase 3: OPEN (Politon R→L flipped, curtain slides left as a block) ──
function openPhase(onDone) {
  el.style.display   = 'block';
  logo.style.display = 'block'; // logo already visible from closePhase
  const logoW        = logo.offsetWidth;    // logo is display:block → valid width
  // Curtain: full width, left-anchored — will shift its `left` position leftward
  curtain.style.right     = 'auto';
  curtain.style.left      = '0';
  curtain.style.width     = W + 'px';
  curtain.style.boxShadow = '6px 0 28px rgba(196,160,85,0.45)';

  // Curved Y path for open pass: also centered, slightly different arc
  const yP = [H*0.42, H*0.35, H*0.43, H*0.42];

  let t0 = null;
  requestAnimationFrame(function step(ts) {
    if (!t0) t0 = ts;
    const raw = Math.min((ts - t0) / OPEN_DUR, 1);
    const t   = ease(raw);

    // X: W+FW → -FW (enters from right, exits left)
    const x = (W + FW) - (W + 2 * FW) * t;
    // Y: bezier curve
    const y = cbez(yP[0], yP[1], yP[2], yP[3], t);
    // Rotation (negate dx so angle is relative to left-facing direction)
    const t2   = ease(Math.min(raw + 0.015, 1));
    const x2   = (W + FW) - (W + 2 * FW) * t2;
    const y2   = cbez(yP[0], yP[1], yP[2], yP[3], t2);
    const deg  = Math.atan2(y2 - y, x - x2) * 180 / Math.PI; // x-x2 → positive for L-moving

    el.style.left      = x.toFixed(1) + 'px';
    el.style.top       = y.toFixed(1) + 'px';
    el.style.transform = 'scaleX(-1) rotate(' + deg.toFixed(1) + 'deg)';

    // Curtain slides left as one solid block: its right edge tracks Politon's center (half in / half out)
    // left = min(0,  x + FW/2 - W)  →  right edge = left + W = x + FW/2
    const cLeft = Math.min(0, x + FW/2 - W);
    curtain.style.left = cLeft.toFixed(0) + 'px';
    // Keep logo centered in visible curtain; hide when visible curtain drops below half-screen
    const visW = cLeft + W;
    // Logo tracks center of visible curtain — exits left smoothly as curtain slides away
    logo.style.left = (visW / 2 - logoW / 2).toFixed(0) + 'px';

    if (raw < 1) {
      requestAnimationFrame(step);
    } else {
      curtain.style.left      = (-W) + 'px'; // fully off screen
      curtain.style.boxShadow = 'none';
      el.style.display   = 'none';
      logo.style.display = 'none';
      onDone();
    }
  });
}

// ── Entry point ────────────────────────────────────────────────────
function run() {
  closePhase(() => {
    openPhase(() => {
      if (LOOP) setTimeout(run, LOOP_WAIT);
    });
  });
}

setTimeout(run, INIT_WAIT);
</script>
